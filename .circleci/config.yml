version: 2.1

orbs:
  aws-cli: circleci/aws-cli@3.1.5
  node: circleci/node@5.1.0

executors:
  node-executor:
    docker:
      - image: cimg/node:18-browsers
    working_directory: ~/project

jobs:
  build:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "backend/package.json" }}
            - v1-dependencies-
      - run:
          name: Install backend dependencies
          command: cd backend && npm install
      - run:
          name: Install frontend dependencies
          command: npm install
      - save_cache:
          key: v1-dependencies-{{ checksum "backend/package.json" }}
          paths:
            - backend/node_modules
            - node_modules
      - run:
          name: Run tests
          command: npm test

  deploy-backend:
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup
      - run:
          name: Deploy to EC2 via CodeDeploy
          command: |
            aws deploy create-deployment \
              --application-name bookstore-app \
              --deployment-group-name bookstore-backend \
              --deployment-config-name CodeDeployDefault.OneAtATime \
              --s3-location bucket=bookstore-deploy,bundleType=zip,key=backend.zip

  deploy-frontend:
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup
      - run:
          name: Sync to S3
          command: |
            aws s3 sync . s3://bookstore-frontend-${CIRCLE_BRANCH} \
              --exclude "backend/*" \
              --exclude "infrastructure/*" \
              --exclude ".circleci/*" \
              --exclude "lambda/*" \
              --delete

workflows:
  build-and-deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
                - develop
      - deploy-backend:
          requires:
            - build
          filters:
            branches:
              only:
                - main
      - deploy-frontend:
          requires:
            - build
          filters:
            branches:
              only:
                - main
